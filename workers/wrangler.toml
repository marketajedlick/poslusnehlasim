name = "poslusnehlasim-odebir"
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"

[vars]
ALLOWED_ORIGIN = "https://poslusnehlasim.cz,https://www.poslusnehlasim.cz,http://127.0.0.1:8765,http://localhost:8765,http://127.0.0.1:8000,http://localhost:8000"
ECOMAIL_SUBSCRIBE_LIST_ID = "3"
RATE_LIMIT_ID = "00000000000000000000000000000000"
# Výchozí limity: 10 POST/hod z IP, 3 odběry/den na e-mail
RATE_LIMIT_IP_MAX = "10"
RATE_LIMIT_IP_WINDOW = "3600"
RATE_LIMIT_EMAIL_MAX = "3"
RATE_LIMIT_EMAIL_WINDOW = "86400"
NOTIFY_DEDUPE_WINDOW = "86400"
# Korektury: 20 POST/hod z IP
CORRECTIONS_RATE_LIMIT_IP_MAX = "20"
CORRECTIONS_RATE_LIMIT_IP_WINDOW = "3600"

# KV pro rate limit — id doplní CI nebo: wrangler kv namespace create poslusnehlasim-odebir-rl
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "00000000000000000000000000000000"

# Secrets (wrangler pages secret put … --project-name=poslusnehlasim-odebir):
# ECOMAIL_API_KEY, ECOMAIL_FROM_EMAIL, NOTIFY_EMAIL — odběr novinek
# RESEND_API_KEY — korektury („Něco nesedí?“); volitelně CORRECTIONS_NOTIFY_EMAIL
# RESEND_FROM_EMAIL / RESEND_FROM_NAME — odesílatel korektur (fallback ECOMAIL_FROM_EMAIL)
# ECOMAIL_SUBSCRIBE_LIST_ID je v [vars] výše (dev/test = seznam 3)
