name: Setup Svejk Python
description: Python 3.12 a závislosti z requirements-svejk.txt

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: requirements-svejk.txt

    - name: Install dependencies
      shell: bash
      run: pip install -r requirements-svejk.txt
