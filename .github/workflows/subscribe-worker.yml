name: Deploy subscribe worker

on:
  push:
    branches: [main, master]
    paths:
      - "workers/**"
      - "scripts/deploy-subscribe-worker.sh"
      - ".github/workflows/subscribe-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy subscribe API (Cloudflare Pages)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ECOMAIL_API_KEY: ${{ secrets.ECOMAIL_API_KEY }}
          ECOMAIL_FROM_EMAIL: ${{ secrets.ECOMAIL_FROM_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CORRECTIONS_NOTIFY_EMAIL: ${{ secrets.CORRECTIONS_NOTIFY_EMAIL }}
        run: ./scripts/deploy-subscribe-worker.sh
