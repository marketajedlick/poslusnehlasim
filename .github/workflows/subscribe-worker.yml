name: Deploy subscribe worker

on:
  push:
    branches: [main, master]
    paths:
      - "workers/**"
      - ".github/workflows/subscribe-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy subscribe API (Cloudflare Pages)
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ECOMAIL_API_KEY: ${{ secrets.ECOMAIL_API_KEY }}
          ECOMAIL_FROM_EMAIL: ${{ secrets.ECOMAIL_FROM_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID chybí — API odběru se nenasadí."
            echo "Viz DEPLOY.md → Odběr z webu (Cloudflare Worker)."
            exit 0
          fi
          if [ -z "$ECOMAIL_API_KEY" ]; then
            echo "ECOMAIL_API_KEY chybí — API bez klíče nedává smysl."
            exit 0
          fi
          PROJECT=poslusnehlasim-odebir
          KV_TITLE=poslusnehlasim-odebir-rl
          npx wrangler@4 pages project create "$PROJECT" --production-branch=main 2>/dev/null || true
          KV_ID=$(npx wrangler@4 kv namespace list 2>/dev/null | node -e "
            const title = process.argv[1];
            const list = JSON.parse(require('fs').readFileSync(0, 'utf8') || '[]');
            const ns = list.find((n) => n.title === title);
            process.stdout.write(ns?.id || '');
          " "$KV_TITLE")
          if [ -z "$KV_ID" ]; then
            KV_ID=$(npx wrangler@4 kv namespace create "$KV_TITLE" --json | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).id)")
          fi
          sed -i "s/00000000000000000000000000000000/$KV_ID/g" wrangler.toml
          cp subscribe.js public/_worker.js
          npm exec wrangler@4 pages secret put ECOMAIL_API_KEY --project-name="$PROJECT" <<< "$ECOMAIL_API_KEY"
          if [ -n "$ECOMAIL_FROM_EMAIL" ]; then
            npm exec wrangler@4 pages secret put ECOMAIL_FROM_EMAIL --project-name="$PROJECT" <<< "$ECOMAIL_FROM_EMAIL"
            npm exec wrangler@4 pages secret put NOTIFY_EMAIL --project-name="$PROJECT" <<< "${NOTIFY_EMAIL:-$ECOMAIL_FROM_EMAIL}"
          fi
          DEPLOY_OUTPUT=$(npm exec wrangler@4 pages deploy public --project-name="$PROJECT" --branch=main 2>&1)
          echo "$DEPLOY_OUTPUT"
          URL="https://${PROJECT}.pages.dev"
          echo ""
          echo "→ URL API odběru: $URL"
          echo "→ Ulož do GitHub Secret SVEJK_SUBSCRIBE_API_URL a spusť deploy webu."
          if ! curl -4 -sfI "$URL" >/dev/null 2>&1; then
            echo "::warning::Pages deploy hotov, ale HTTPS ještě neodpovídá — zkus za chvíli: curl -I $URL"
          fi
