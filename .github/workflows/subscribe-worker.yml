name: Deploy subscribe worker

on:
  push:
    branches: [main, master]
    paths:
      - "workers/**"
      - ".github/workflows/subscribe-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy Cloudflare Worker
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ECOMAIL_API_KEY: ${{ secrets.ECOMAIL_API_KEY }}
          ECOMAIL_FROM_EMAIL: ${{ secrets.ECOMAIL_FROM_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID chybí — worker se nenasadí."
            echo "Viz DEPLOY.md → Odběr z webu (Cloudflare Worker)."
            exit 0
          fi
          if [ -z "$ECOMAIL_API_KEY" ]; then
            echo "ECOMAIL_API_KEY chybí — worker bez klíče nedává smysl."
            exit 0
          fi
          npm exec wrangler@4 secret put ECOMAIL_API_KEY <<< "$ECOMAIL_API_KEY"
          if [ -n "$ECOMAIL_FROM_EMAIL" ]; then
            npm exec wrangler@4 secret put ECOMAIL_FROM_EMAIL <<< "$ECOMAIL_FROM_EMAIL"
            npm exec wrangler@4 secret put NOTIFY_EMAIL <<< "${NOTIFY_EMAIL:-$ECOMAIL_FROM_EMAIL}"
          fi
          DEPLOY_OUTPUT=$(npm exec wrangler@4 deploy 2>&1)
          echo "$DEPLOY_OUTPUT"
          WORKER_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9-]+\.[a-zA-Z0-9-]+\.workers\.dev' | head -1)
          echo ""
          echo "→ URL workeru: ${WORKER_URL:-?}"
          echo "→ Ulož do GitHub Secret SVEJK_SUBSCRIBE_API_URL a spusť deploy webu."
          echo ""
          echo "Zapínám workers.dev route (jinak SSL handshake failure)…"
          API_RESPONSE=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/poslusnehlasim-subscribe/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}')
          echo "$API_RESPONSE"
          if ! echo "$API_RESPONSE" | grep -qE '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "::warning::Nepodařilo se zapnout workers.dev — v dashboardu: Worker → Settings → Domains & Routes → Enable u workers.dev"
          elif [ -n "$WORKER_URL" ]; then
            sleep 5
            if ! curl -4 -sfI "$WORKER_URL" >/dev/null 2>&1; then
              echo "::warning::Worker běží (HTTP OK), ale HTTPS ještě neodpovídá — v dashboardu zkontroluj Domains & Routes u workers.dev; může trvat pár minut."
            fi
          fi
