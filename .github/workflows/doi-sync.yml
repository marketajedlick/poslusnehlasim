name: Sync DOI template to Ecomail

on:
  workflow_dispatch:
    inputs:
      enable_double_optin:
        description: "Zapnout double opt-in na seznamu"
        type: boolean
        default: true

env:
  ECOMAIL_SUBSCRIBE_LIST_ID: "3"
  ECOMAIL_FROM_NAME: Poslušně hlásím
  SVEJK_SITE_URL: https://poslusnehlasim.cz

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-svejk

      - name: Sync DOI template to Ecomail
        env:
          ECOMAIL_API_KEY: ${{ secrets.ECOMAIL_API_KEY }}
          ECOMAIL_FROM_EMAIL: ${{ secrets.ECOMAIL_FROM_EMAIL }}
        run: |
          args=(--apply)
          if [ "${{ inputs.enable_double_optin }}" = "true" ]; then
            args+=(--enable-double-optin)
          fi
          ./run-svejk.sh newsletter-doi-sync "${args[@]}"
