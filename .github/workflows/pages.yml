name: Build and deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - processed/newsletter-state.json
  workflow_dispatch:
    inputs:
      newsletter_force:
        description: "Vynutit nový Ecomail koncept i pro stejné vydání"
        type: boolean
        default: false
  schedule:
    # Po–Pá večer a ráno (UTC) — po jednání PS
    - cron: "30 20 * * 1-5"
    - cron: "0 4 * * 1-6"

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  SVEJK_SITE_URL: https://poslusnehlasim.cz
  SVEJK_BASE_PATH: ""
  ECOMAIL_FROM_NAME: Poslušně hlásím

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-svejk

      - name: Publish gate check
        run: ./run-svejk.sh publish-check --obdobi 2025

      - name: Export static site
        env:
          SVEJK_PAGES_CNAME: poslusnehlasim.cz
          SVEJK_PUBLISH_GATE: "1"
          SVEJK_SHOW_SUBSCRIBE: "1"
          SVEJK_SUBSCRIBE_API_URL: ${{ secrets.SVEJK_SUBSCRIBE_API_URL }}
        run: |
          if [ -z "$SVEJK_SUBSCRIBE_API_URL" ]; then
            echo "::warning::SVEJK_SUBSCRIBE_API_URL chybí — odběr na webu nemusí fungovat. Nasaz worker: workflow Deploy subscribe worker."
          fi
          ./run-svejk.sh export-pages --obdobi 2025 --out site --cname poslusnehlasim.cz

      - name: Notify newsletter (Ecomail)
        continue-on-error: true
        env:
          ECOMAIL_API_KEY: ${{ secrets.ECOMAIL_API_KEY }}
          ECOMAIL_LIST_ID: "3"
          ECOMAIL_FROM_EMAIL: ${{ secrets.ECOMAIL_FROM_EMAIL }}
        run: |
          if [ -z "$ECOMAIL_API_KEY" ]; then
            echo "ECOMAIL_API_KEY není nastaven — přeskočeno"
            exit 0
          fi
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.newsletter_force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          ./run-svejk.sh newsletter-notify --obdobi 2025 --out site $FORCE_FLAG || echo "Newsletter notify selhal — deploy pokračuje"

      - name: Commit newsletter state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add processed/newsletter-state.json
          if git diff --staged --quiet; then
            echo "Newsletter state beze změny."
            exit 0
          fi
          git commit -m "newsletter: aktualizace stavu po notify [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
