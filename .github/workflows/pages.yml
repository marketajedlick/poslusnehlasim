name: Build and deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - processed/newsletter-state.json
  workflow_dispatch:
    inputs:
      newsletter_force:
        description: "Vynutit nový Ecomail koncept i pro stejné vydání"
        type: boolean
        default: false
  schedule:
    # Po–Pá večer a ráno (UTC) — po jednání PS
    - cron: "30 20 * * 1-5"
    - cron: "0 4 * * 1-6"

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-svejk.txt

      - name: Install dependencies
        run: pip install -r requirements-svejk.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy subscribe API (Cloudflare Pages)
        id: subscribe_worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ECOMAIL_API_KEY: ${{ secrets.ECOMAIL_API_KEY }}
          ECOMAIL_FROM_EMAIL: ${{ secrets.ECOMAIL_FROM_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$ECOMAIL_API_KEY" ]; then
            echo "Cloudflare API odběru přeskočeno (chybí CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID nebo ECOMAIL_API_KEY)"
            echo "url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cd workers
          PROJECT=poslusnehlasim-odebir
          npx wrangler@4 pages project create "$PROJECT" --production-branch=main 2>/dev/null || true
          cp subscribe.js public/_worker.js
          printf '%s' "$ECOMAIL_API_KEY" | npx wrangler@4 pages secret put ECOMAIL_API_KEY --project-name="$PROJECT"
          if [ -n "$ECOMAIL_FROM_EMAIL" ]; then
            printf '%s' "$ECOMAIL_FROM_EMAIL" | npx wrangler@4 pages secret put ECOMAIL_FROM_EMAIL --project-name="$PROJECT"
            printf '%s' "${NOTIFY_EMAIL:-$ECOMAIL_FROM_EMAIL}" | npx wrangler@4 pages secret put NOTIFY_EMAIL --project-name="$PROJECT"
          fi
          set +e
          DEPLOY_OUTPUT=$(npx wrangler@4 pages deploy public --project-name="$PROJECT" --branch=main 2>&1)
          DEPLOY_STATUS=$?
          set -e
          echo "$DEPLOY_OUTPUT"
          URL="https://${PROJECT}.pages.dev"
          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            echo "::warning::Pages deploy selhal (exit $DEPLOY_STATUS)."
            echo "url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Subscribe API URL: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          if ! curl -4 -sfI "$URL" >/dev/null 2>&1; then
            echo "::warning::Pages deploy hotov, ale HTTPS ještě neodpovídá — zkus za chvíli: curl -I $URL"
          fi


     # - name: Refresh data from Hlídač (cron / ručně)
     #   if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
     #   env:
     #     HLIDAC_TOKEN: ${{ secrets.HLIDAC_TOKEN }}
     #   run: |
     #     if [ -z "$HLIDAC_TOKEN" ]; then
    #        echo "HLIDAC_TOKEN není nastaven — používám committed processed/facts"
     #       exit 0
     #     fi
    #      ./run-svejk.sh build --obdobi 2025 --vsechny-schuze -q \
     #       || ./run-svejk.sh build --obdobi 2025 --vsechny-schuze --only align,extract,compose -q

      - name: Publish gate check
        run: ./run-svejk.sh publish-check --obdobi 2025

      - name: Export static site
        env:
          SVEJK_BASE_PATH: ""
          SVEJK_PAGES_CNAME: poslusnehlasim.cz
          SVEJK_SITE_URL: https://poslusnehlasim.cz
          SVEJK_PUBLISH_GATE: "1"
          ECOMAIL_FORM_ACTION: https://poslusnehlasim.ecomailapp.cz/public/subscribe/2/2bb287d15897fe2f9d89c882af9a3a8b
          SVEJK_SHOW_SUBSCRIBE: "1"
          SVEJK_SUBSCRIBE_API_URL: ${{ steps.subscribe_worker.outputs.url || secrets.SVEJK_SUBSCRIBE_API_URL }}
          ECOMAIL_API_KEY: ${{ secrets.ECOMAIL_API_KEY }}
          ECOMAIL_FROM_EMAIL: ${{ secrets.ECOMAIL_FROM_EMAIL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$ECOMAIL_API_KEY" ] && [ -z "$SVEJK_SUBSCRIBE_API_URL" ]; then
            echo "::warning::Odběr běží bez worker API — nové e-maily nemusí projít. Zkontroluj deploy krok „Deploy subscribe worker“."
          fi
          ./run-svejk.sh export-pages --obdobi 2025 --out site --cname poslusnehlasim.cz

      - name: Notify newsletter (Ecomail)
        continue-on-error: true
        env:
          ECOMAIL_API_KEY: ${{ secrets.ECOMAIL_API_KEY }}
          ECOMAIL_LIST_ID: "3"
          ECOMAIL_FROM_EMAIL: ${{ secrets.ECOMAIL_FROM_EMAIL }}
          ECOMAIL_FROM_NAME: Poslušně hlásím
          SVEJK_SITE_URL: https://poslusnehlasim.cz
          SVEJK_BASE_PATH: ""
        run: |
          if [ -z "$ECOMAIL_API_KEY" ]; then
            echo "ECOMAIL_API_KEY není nastaven — přeskočeno"
            exit 0
          fi
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.newsletter_force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          # Jen koncept kampaně — odeslání ručně v Ecomail UI
          ./run-svejk.sh newsletter-notify --obdobi 2025 --out site $FORCE_FLAG || echo "Newsletter notify selhal — deploy pokračuje"

      - name: Commit newsletter state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add processed/newsletter-state.json
          if git diff --staged --quiet; then
            echo "Newsletter state beze změny."
            exit 0
          fi
          git commit -m "newsletter: aktualizace stavu po notify [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
