name: Sync PSP data

on:
  workflow_dispatch:
  schedule:
    # Po–Pá ráno a večer (UTC) — po jednání PS
    - cron: "0 5 * * 1-6"
    - cron: "0 21 * * 1-5"

concurrency:
  group: sync-psp-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-svejk

      - uses: ./.github/actions/restore-steno-cache

      - name: Sync UNL + Hlídač → processed/
        env:
          HLIDAC_TOKEN: ${{ secrets.HLIDAC_TOKEN }}
          HLIDAC_RATE_LIMIT_S: "1.0"
        run: |
          if [ -z "$HLIDAC_TOKEN" ]; then
            echo "::warning::HLIDAC_TOKEN není nastaven — sync stáhne jen UNL hlasování."
          fi
          ./run-svejk.sh sync --obdobi 2025 -q || exit 1

      - name: Save steno cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: processed/*/raw/steno.jsonl
          key: steno-v1-${{ hashFiles('processed/sync-state.json') }}

      - name: Commit synced data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hl-2025ps/hl2025s.unl processed/sync-state.json
          git add processed/2025-s*/raw/votes.jsonl
          if git diff --staged --quiet; then
            echo "Žádné změny k commitu."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit \
            -m "sync: aktualizace dat PSP (UNL + processed)" \
            -m "Automatický sync z workflow Sync PSP data."
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Notifikace — nová data stažena
        if: steps.commit.outputs.committed == 'true'
        run: |
          echo "::warning::Sync stáhl nová data PSP (UNL + raw/). Doplň facts ručně, pak align/extract/compose lokálně."
