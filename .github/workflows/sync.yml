name: Sync PSP data

on:
  workflow_dispatch:
  schedule:
    # Po–Pá ráno a večer (UTC) — po jednání PS
    - cron: "0 5 * * 1-6"
    - cron: "0 21 * * 1-5"

concurrency:
  group: sync-psp-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-svejk.txt

      - name: Install dependencies
        run: pip install -r requirements-svejk.txt

      - name: Restore steno cache
        uses: actions/cache/restore@v4
        with:
          path: processed/*/raw/steno.jsonl
          key: steno-v1-${{ hashFiles('processed/sync-state.json') }}
          restore-keys: |
            steno-v1-

      - name: Sync UNL + Hlídač → processed/
        env:
          HLIDAC_TOKEN: ${{ secrets.HLIDAC_TOKEN }}
          HLIDAC_RATE_LIMIT_S: "1.0"
        run: |
          if [ -z "$HLIDAC_TOKEN" ]; then
            echo "::warning::HLIDAC_TOKEN není nastaven — sync stáhne jen UNL hlasování."
          fi
          ./run-svejk.sh sync --obdobi 2025 -q || exit 1

      - name: Save steno cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: processed/*/raw/steno.jsonl
          key: steno-v1-${{ hashFiles('processed/sync-state.json') }}

      - name: Commit synced data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hl-2025ps/hl2025s.unl processed/sync-state.json
          git add processed/2025-s*/raw/votes.jsonl
          git add processed/2025-s*/aligned/
          git add processed/2025-s*/facts/
          git add processed/2025-s*/manifest.json
          if git diff --staged --quiet; then
            echo "Žádné změny k commitu."
            exit 0
          fi
          git commit \
            -m "sync: aktualizace dat PSP (UNL + processed)" \
            -m "Automatický sync z workflow Sync PSP data."
          git push
