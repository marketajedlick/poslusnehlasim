<div id="term-sheet-root" hidden>
  <button type="button" class="sheet-overlay" id="term-sheet-overlay" aria-label="Zavřít slovníček"></button>
  <div class="sheet-panel" id="term-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="term-sheet-label">
    <div class="sheet-handle" aria-hidden="true"></div>
    <p class="sheet-kicker">Slovníček pojmů</p>
    <p class="sheet-term" id="term-sheet-label"></p>
    <p class="sheet-def" id="term-sheet-def"></p>
    <button type="button" class="sheet-btn" id="term-sheet-close">Poslušně hlásím, že rozumím</button>
  </div>
</div>
