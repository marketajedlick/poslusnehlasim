<div id="share-sheet-root" hidden>
  <button type="button" class="sheet-overlay" id="share-sheet-overlay" aria-label="Zavřít sdílení"></button>
  <div class="sheet-panel is-share" id="share-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="share-sheet-label">
    <div class="sheet-handle" aria-hidden="true"></div>
    <p class="sheet-kicker">Poslat hlášení</p>
    <p class="sheet-term" id="share-sheet-label"></p>
    <div class="sheet-actions">
      <button type="button" class="sheet-action-primary" id="share-twitter" disabled>𝕏 Sdílet na Twitteru</button>
      <button type="button" class="sheet-action-secondary" id="share-download" hidden disabled>↓ Stáhnout obrázek</button>
      <button type="button" class="sheet-action-secondary" id="share-copy" disabled>⧉ Kopírovat odkaz</button>
      <button type="button" class="sheet-close-text" id="share-sheet-close">Zavřít</button>
    </div>
  </div>
</div>
