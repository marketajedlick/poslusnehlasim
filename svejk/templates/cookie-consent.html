<style>
.cookie-consent{
  position:fixed;
  z-index:9999;
  left:0; right:0; bottom:0;
  padding:12px 12px calc(12px + env(safe-area-inset-bottom, 0px));
  background:rgba(33,28,20,.92);
  color:#f0e6cf;
  font-family:'Old Standard TT',Georgia,serif;
  font-size:15px;
  line-height:1.45;
}
.cookie-consent[hidden]{ display:none !important; }
.cookie-consent-inner{
  max-width:840px;
  margin:0 auto;
  display:flex;
  flex-wrap:wrap;
  gap:12px 16px;
  align-items:center;
  justify-content:space-between;
}
.cookie-consent-text{
  margin:0;
  flex:1 1 16rem;
  max-width:52ch;
}
.cookie-consent-text a{
  color:#f0e6cf;
  text-underline-offset:2px;
}
.cookie-consent-actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  flex:0 0 auto;
}
.cookie-consent-btn{
  font-family:'Anton',sans-serif;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-size:13px;
  padding:10px 14px;
  border:2px solid #f0e6cf;
  border-radius:3px;
  cursor:pointer;
  background:transparent;
  color:#f0e6cf;
}
.cookie-consent-btn--accept{
  background:#f5c430;
  border-color:#f5c430;
  color:#262626;
}
.cookie-consent-btn:hover{ filter:brightness(1.06); }
.cookie-settings-btn{
  font:inherit;
  color:inherit;
  background:none;
  border:none;
  padding:0;
  text-decoration:underline;
  text-underline-offset:2px;
  cursor:pointer;
}
</style>
<div id="cookie-consent" class="cookie-consent" role="dialog" aria-labelledby="cookie-consent-title" aria-live="polite" hidden>
  <div class="cookie-consent-inner">
    <p id="cookie-consent-title" class="cookie-consent-text">
      {{ t.cookie.text }}
      <a href="{{ cookie_privacy_url | default('/soukromi/') }}" rel="noopener">{{ t.cookie.privacy_link }}</a>.
    </p>
    <div class="cookie-consent-actions">
      <button type="button" class="cookie-consent-btn" id="cookie-reject" data-action="reject">{{ t.cookie.reject }}</button>
      <button type="button" class="cookie-consent-btn cookie-consent-btn--accept" id="cookie-accept" data-action="accept">{{ t.cookie.accept }}</button>
    </div>
  </div>
</div>
<script>
(function () {
  var STORAGE_KEY = "ph_cookie_consent";
  var GA_ID = "G-DV9Y4JXX05";

  function gtag() {
    window.dataLayer.push(arguments);
  }

  function loadGA() {
    if (window.__phGaLoaded) return;
    window.__phGaLoaded = true;
    gtag("consent", "update", {
      ad_storage: "denied",
      ad_user_data: "denied",
      ad_personalization: "denied",
      analytics_storage: "granted"
    });
    var s = document.createElement("script");
    s.async = true;
    s.src = "https://www.googletagmanager.com/gtag/js?id=" + GA_ID;
    document.head.appendChild(s);
    gtag("js", new Date());
    gtag("config", GA_ID);
  }

  function denyConsent() {
    gtag("consent", "update", {
      ad_storage: "denied",
      ad_user_data: "denied",
      ad_personalization: "denied",
      analytics_storage: "denied"
    });
  }

  function saveChoice(value) {
    try { localStorage.setItem(STORAGE_KEY, value); } catch (e) {}
  }

  function getChoice() {
    try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; }
  }

  function banner() {
    return document.getElementById("cookie-consent");
  }

  function showBanner() {
    var el = banner();
    if (el) el.hidden = false;
  }

  function hideBanner() {
    var el = banner();
    if (el) el.hidden = true;
  }

  function applyStoredChoice() {
    var choice = getChoice();
    if (choice === "granted") {
      loadGA();
      hideBanner();
      return true;
    }
    if (choice === "denied") {
      denyConsent();
      hideBanner();
      return true;
    }
    return false;
  }

  window.phOpenCookieSettings = function () {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    denyConsent();
    window.__phGaLoaded = false;
    showBanner();
  };

  document.addEventListener("DOMContentLoaded", function () {
    if (applyStoredChoice()) return;
    showBanner();

    document.getElementById("cookie-accept")?.addEventListener("click", function () {
      saveChoice("granted");
      loadGA();
      hideBanner();
    });

    document.getElementById("cookie-reject")?.addEventListener("click", function () {
      saveChoice("denied");
      denyConsent();
      hideBanner();
    });
  });
})();
</script>
