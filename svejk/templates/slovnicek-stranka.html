<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#c9bda3" />
<link rel="icon" type="image/svg+xml" href="{{ favicon_svg }}" />
<link rel="icon" type="image/png" href="{{ favicon_png }}" sizes="32x32" />
<link rel="apple-touch-icon" href="{{ apple_touch_icon }}" />
<title>Švejkův slovníček · Poslušně hlásím</title>
<meta name="description" content="Krátké vysvětlení pojmů z Poslanecké sněmovny pro lidi, kteří politiku běžně nesledují." />
<link rel="canonical" href="{{ canonical_url }}" />
<link rel="stylesheet" href="{{ fonts_css_href }}" />
<link rel="stylesheet" href="{{ css_href }}" />
</head>
<body class="slovnicek-page">
<div class="slovnicek-wrap">
  <header class="slovnicek-head">
    <h1 class="slovnicek-title">Švejkův slovníček</h1>
    <p class="slovnicek-gloss">Krátké vysvětlení pojmů ze sněmovny pro lidi, kteří politiku běžně nesledují.</p>
    {% if archive_href %}
    <a class="slovnicek-back" href="{{ archive_href }}">Archiv vydání</a>
    {% endif %}
  </header>

  <dl class="slovnicek-list slovnicek-list--page">
    {% for question, answer in slovnicek %}
    <div class="slovnicek-entry">
      <dt>{{ question }}</dt>
      <dd>{{ answer }}</dd>
    </div>
    {% endfor %}
  </dl>
</div>
</body>
</html>
