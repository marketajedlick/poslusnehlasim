{% if lang_switch_href %}
<nav class="lang-switch" aria-label="{{ t.nav.lang_toggle_aria }}">
  {% if locale == 'cs' %}
  <span class="lang-switch-item is-active" aria-current="page">CS</span>
  {% else %}
  <a class="lang-switch-item" href="{{ lang_switch_href }}" hreflang="cs" lang="cs">CS</a>
  {% endif %}
  {% if locale == 'en' %}
  <span class="lang-switch-item is-active" aria-current="page">EN</span>
  {% else %}
  <a class="lang-switch-item" href="{{ lang_switch_href }}" hreflang="en" lang="en">EN</a>
  {% endif %}
</nav>
{% endif %}
