<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ t.doi.title }}</title>
{% if static_base %}<style>
@font-face{font-family:'Archivo';font-style:normal;font-weight:500 900;src:url('{{ static_base }}/fonts/archivo-latin-ext.woff2') format('woff2');}
@font-face{font-family:'Archivo';font-style:normal;font-weight:500 900;src:url('{{ static_base }}/fonts/archivo-latin.woff2') format('woff2');}
@font-face{font-family:'Old Standard TT';font-style:normal;font-weight:400;src:url('{{ static_base }}/fonts/oldstandardtt-400-latin-ext.woff2') format('woff2');}
@font-face{font-family:'Old Standard TT';font-style:normal;font-weight:400;src:url('{{ static_base }}/fonts/oldstandardtt-400-latin.woff2') format('woff2');}
@font-face{font-family:'Old Standard TT';font-style:italic;font-weight:400;src:url('{{ static_base }}/fonts/oldstandardtt-400italic-latin-ext.woff2') format('woff2');}
@font-face{font-family:'Old Standard TT';font-style:italic;font-weight:400;src:url('{{ static_base }}/fonts/oldstandardtt-400italic-latin.woff2') format('woff2');}
</style>{% endif %}
<style>{{ css | safe }}</style>
</head>
<body>

<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#f7f2f0;">
<tr>
<td align="center" style="padding:0;">
<table role="presentation" class="email-wrap" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;background:#f7f2f0;border-radius:0;">
<tr>
<td class="email-pad">

<div class="masthead doi-head">
  {% if svejk_head_url %}<img class="masthead-fav" src="{{ svejk_head_url }}" alt="Poslušně hlásím" width="84" height="84" style="display:block;width:84px;height:84px;margin:0 auto 10px;border:0;">{% endif %}
  <div class="eyebrow">{{ t.doi.eyebrow }}</div>
  <h1 class="mast email-mast doi-mast">Poslušně<br>hlásím!</h1>
</div>

<div class="doi-body">
  <p class="doi-intro">{{ t.doi.intro }}</p>
</div>

<div class="doi-cta-wrap">
<!--[if mso]>
<v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" href="*|SUBCONFIRM|*" style="height:46px;v-text-anchor:middle;width:240px;" arcsize="8%" stroke="f" fillcolor="#ff4411">
<w:anchorlock/>
<center style="color:#ffffff;font-family:Arial,sans-serif;font-size:14px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;">{{ t.doi.cta }}</center>
</v:roundrect>
<![endif]-->
<!--[if !mso]><!-->
<a href="*|SUBCONFIRM|*" class="email-cta" style="mso-hide:all;">{{ t.doi.cta }}</a>
<!--<![endif]-->
</div>

<p class="doi-note">{{ t.doi.inbox_tip }}</p>

<div class="doi-quote-wrap">
<div class="verdict verdict-doi">
  <p class="q"><span class="q-quote"><span class="q-mark">„</span><span class="key">{{ t.doi.quote_key }}</span> {{ t.doi.quote_body }}<span class="q-mark">"</span></span></p>
</div>
</div>

<div class="email-legal doi-legal">
  <p style="margin:0 0 8px;">{{ t.doi.footer }}</p>
  <p style="margin:0;">
    <a href="{{ privacy_url }}" style="color:#5a503e;text-decoration:underline;">{{ t.doi.privacy_link }}</a>
  </p>
</div>

</td>
</tr>
</table>
</td>
</tr>
</table>

</body>
</html>
