<meta property="og:type" content="{{ og_type | default('website') }}" />
<meta property="og:locale" content="{{ og_locale | default('cs_CZ') }}" />
<meta property="og:site_name" content="Poslušně hlásím" />
<meta property="og:title" content="{{ og_title }}" />
<meta property="og:description" content="{{ og_description }}" />
<meta property="og:url" content="{{ canonical_url }}" />
{% if og_image_url %}
<meta property="og:image" content="{{ og_image_url }}" />
<meta property="og:image:width" content="{{ og_image_width | default(200) }}" />
<meta property="og:image:height" content="{{ og_image_height | default(280) }}" />
<meta property="og:image:alt" content="{{ og_image_alt | default('Poslušně hlásím, Švejk') }}" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="{{ og_image_url }}" />
<meta name="twitter:image:alt" content="{{ og_image_alt | default('Poslušně hlásím, Švejk') }}" />
{% else %}
<meta name="twitter:card" content="summary" />
{% endif %}
<meta name="twitter:title" content="{{ og_title }}" />
<meta name="twitter:description" content="{{ og_description }}" />
