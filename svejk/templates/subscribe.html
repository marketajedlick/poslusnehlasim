        {% if newsletter.show_subscribe %}
        <section class="subscribe" aria-label="Odběr novinek">
          <p class="subscribe-gloss">Do sněmovny sám nemusíš, nech mi tu email a pošleme ti nové vydání.</p>
          <form
            class="subscribe-form"
            action="{{ newsletter.form_action or '#' }}"
            method="post"
            novalidate
            {% if newsletter.subscribe_api_url %}data-subscribe-api="{{ newsletter.subscribe_api_url }}"{% endif %}
          >
            <input type="text" name="website" tabindex="-1" autocomplete="off" class="subscribe-hp" aria-hidden="true" />
            <div class="subscribe-row">
              <input
                class="subscribe-input"
                type="email"
                name="email"
                required
                autocomplete="email"
                aria-label="E-mail pro odběr novinek"
                placeholder="vas@email.cz"
              />
              <button class="subscribe-btn" type="submit">Poslušně odebírat</button>
            </div>
            <p class="subscribe-success" hidden>Poslušně hlásím — jsi zapsaný.</p>
          </form>
          {% if newsletter.embed_widget_id %}
          <div class="subscribe-embed" aria-label="Ecomail formulář odběru">
            <div id="{{ newsletter.embed_mount_id }}"></div>
            <script>
              (function (w,d,s,o,f,js,fjs) {
                w['ecm-widget']=o;w[o]=w[o]||function(){(w[o].q=w[o].q||[]).push(arguments)};
                js=d.createElement(s), fjs=d.getElementsByTagName(s)[0];
                js.id='{{ newsletter.embed_widget_id }}';
                js.dataset.a='{{ newsletter.embed_account }}';
                js.src=f; js.async=1; fjs.parentNode.insertBefore(js,fjs);
              }(window,document,'script','ecmwidget','{{ newsletter.embed_widget_js }}'));
            </script>
          </div>
          {% endif %}
        </section>
        {% endif %}
