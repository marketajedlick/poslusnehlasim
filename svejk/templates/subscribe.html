        {% if newsletter.show_subscribe %}
        <section class="subscribe" aria-label="{{ t.subscribe.aria }}">
          <p class="subscribe-gloss">{{ t.subscribe.gloss }}</p>
          <form
            class="subscribe-form"
            action="#"
            method="post"
            novalidate
            data-msg-required="{{ t.subscribe.error_required }}"
            data-msg-invalid="{{ t.subscribe.error_invalid }}"
            data-msg-rate-limit="{{ t.subscribe.error_rate_limit }}"
            data-msg-send="{{ t.subscribe.error_send }}"
            data-msg-setup="{{ t.subscribe.error_setup }}"
            data-msg-generic="{{ t.subscribe.error_generic }}"
            data-label-submit="{{ t.subscribe.submit }}"
            data-label-submitting="{{ t.subscribe.submitting }}"
            data-locale="{{ locale | default('cs') }}"
            {% if newsletter.subscribe_api_url %}data-subscribe-api="{{ newsletter.subscribe_api_url }}"{% endif %}
            {% if newsletter.form_action %}data-form-action="{{ newsletter.form_action }}"{% endif %}
          >
            <input type="text" name="website" tabindex="-1" autocomplete="off" class="subscribe-hp" aria-hidden="true" />
            <div class="subscribe-row">
              <div class="subscribe-field">
                <input
                  class="subscribe-input"
                  type="email"
                  name="email"
                  required
                  autocomplete="email"
                  aria-label="{{ t.subscribe.email_aria }}"
                  aria-describedby="subscribe-error"
                  placeholder="{{ t.subscribe.placeholder }}"
                />
                <p class="subscribe-error" id="subscribe-error" hidden role="alert"></p>
              </div>
              <button class="subscribe-btn" type="submit">{{ t.subscribe.submit }}</button>
            </div>
            <p class="subscribe-success" hidden>{{ t.subscribe.success }}</p>
          </form>
          <p class="subscribe-privacy">
            {{ t.subscribe.privacy }}
            <a href="{{ newsletter.privacy_url }}" rel="noopener">{{ t.subscribe.privacy_link }}</a>.
          </p>
        </section>
        {% endif %}
