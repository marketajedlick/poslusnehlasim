        {% if newsletter.show_subscribe %}
        <section class="subscribe" aria-label="Odběr novinek">
          <p class="subscribe-gloss">Do sněmovny chodit nemusíš. Nech mi tu e-mail a noviny přijdou za tebou.</p>
          <form
            class="subscribe-form"
            action="#"
            method="post"
            novalidate
            {% if newsletter.subscribe_api_url %}data-subscribe-api="{{ newsletter.subscribe_api_url }}"{% endif %}
            {% if newsletter.form_action %}data-form-action="{{ newsletter.form_action }}"{% endif %}
          >
            <input type="text" name="website" tabindex="-1" autocomplete="off" class="subscribe-hp" aria-hidden="true" />
            <div class="subscribe-row">
              <div class="subscribe-field">
                <input
                  class="subscribe-input"
                  type="email"
                  name="email"
                  required
                  autocomplete="email"
                  aria-label="E-mail pro odběr novinek"
                  aria-describedby="subscribe-error"
                  placeholder="vas@email.cz"
                />
                <p class="subscribe-error" id="subscribe-error" hidden role="alert"></p>
              </div>
              <button class="subscribe-btn" type="submit">Poslušně odebírat</button>
            </div>
            <p class="subscribe-success" hidden>Poslušně hlásím: zkontroluj e-mail a potvrď odběr.</p>
          </form>
          <p class="subscribe-privacy">
            Odběrem souhlasíš se zpracováním e-mailové adresy za účelem zasílání novinek.
            <a href="{{ newsletter.privacy_url }}" rel="noopener">Jak nakládáme s e-mailem</a>.
          </p>
        </section>
        {% endif %}
